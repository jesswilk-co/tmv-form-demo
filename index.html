<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; -webkit-text-size-adjust: 100%; }

      @media (max-width: 480px) {
        .form-container { padding: 24px 16px !important; }
        .form-heading { font-size: 20px !important; }
        .species-grid { grid-template-columns: repeat(2, 1fr) !important; }
        .summary-row { flex-direction: column !important; gap: 2px !important; }
        .summary-row span:last-child { text-align: left !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- JS include -->
    <script src="out.js"></script>
  </body>
</html>
